# Do not rename me to `Documentation.yml`!
# That is a special name that will get overwritten by rarestbot!!!

# This workflow builds the project under the “starter” configuration, namely, what you would get
# if you ran `swift build` without any arguments. We use this to verify that we can generate the
# documentation for Unidoc itself.
name: Documentation

on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    changes:
        runs-on: ubuntu-latest
        name: Assess changes
        steps:
            -   name: 🤍 Checkout repository 🤍
                uses: actions/checkout@v6

            -   name: 🤍 Decide checks 🤍
                uses: tj-actions/changed-files@v47
                id: changes
                with:
                    files_ignore: |
                        README.md
                        LICENSE
                        NOTICE
                        .mailmap
                        .gitignore
                        .github/FUNDING.yml
        outputs:
            code_changed: ${{ steps.changes.outputs.any_changed }}

    Linux:
        runs-on: ubuntu-24.04
        name: Ubuntu 24.04
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        env:
            UNIDOC_ENABLE_INDEXSTORE: "0"
        steps:
            -   name: 🤍 Install Swift 🤍
                uses: rarestype/swift-install-action@v1
                with:
                    swift-release: "6.3-RELEASE"

            #   This installs an older version of Unidoc, not the one we are testing.
            #   We use `--static-swift-stdlib` so it doesn’t matter if the Unidoc binary was
            #   built with a different version of Swift.
            -   name: 🤍 Install Unidoc 🤍
                uses: rarestype/unidoc-action@master

            -   name: 🤍 Checkout repository 🤍
                uses: actions/checkout@v6

            -   name: 🤍 Build documentation 🤍
                run: |
                    unidoc build \
                        --ci fail-on-errors \
                        --project-path . \
                        --swift-toolchain $SWIFT_INSTALLATION

    macOS:
        runs-on: macos-26
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        env:
            UNIDOC_ENABLE_INDEXSTORE: "0"
        steps:
            -   name: 🤍 Install Unidoc 🤍
                uses: rarestype/unidoc-action@master

            -   name: 🤍 Checkout repository 🤍
                uses: actions/checkout@v6

            -   name: 🤍 Select Xcode 26.4 🤍
                run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

            -   name: 🤍 Build documentation 🤍
                run: |
                    unidoc build \
                        --ci fail-on-errors \
                        --project-path .
