name: package

on:
    workflow_dispatch:
    #   We build semver tags, and the master branch.
    push:
        branches: [ master ]
        tags:
            -   '[0-9]+.[0-9]+.[0-9]+'

jobs:
    macos:
        runs-on: macos-26
        name: macOS
        steps:
            -   name: 💝 Setup AWS CLI 💝
                uses: aws-actions/configure-aws-credentials@v6
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6

            -   name: 💝 Build products 💝
                env:
                    UNIDOC_ENABLE_INDEXSTORE: "1"
                run: |
                    swift --version
                    swift build -c release --product unidoc
                    Scripts/Package .build unidoc

            -   name: 💝 Upload products 💝
                env:
                    DEPLOY_PLATFORM: "${{ runner.os }}-${{ runner.arch }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

                run: Scripts/Deploy unidoc.tar.gz

    linux:
        strategy:
            matrix:
                os:
                    -   codename: jammy
                        version: Ubuntu-22.04
                        display: Ubuntu 22.04

                    -   codename: noble
                        version: Ubuntu-24.04
                        display: Ubuntu 24.04
                arch:
                    -   id: aarch64
                        name: ARM64

                    -   id: x86_64
                        name: X64

        runs-on: ubuntu-24.04
        name: "${{ matrix.os.display }} (${{ matrix.arch.id }})"
        steps:
            -   name: 💝 Setup AWS CLI 💝
                uses: aws-actions/configure-aws-credentials@v6
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6

            -   name: 💝 Build Unidoc 💝
                run: |
                    Scripts/Linux/Build ${{ matrix.arch.id }} \
                        --os ${{ matrix.os.codename }} \
                        --no-jemalloc
                    Scripts/Package .build.${{ matrix.arch.id }} \
                        unidoc

            -   name: 💝 Upload products 💝
                env:
                    DEPLOY_PLATFORM: "${{ matrix.os.version }}-${{ matrix.arch.name }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

                run: Scripts/Deploy unidoc.tar.gz

    linux_server:
        strategy:
            matrix:
                os:
                    -   codename: noble
                        version: Ubuntu-24.04
                        display: Ubuntu 24.04
                arch:
                    -   id: aarch64
                        name: ARM64

        runs-on: ubuntu-24.04
        name: "${{ matrix.os.display }} (${{ matrix.arch.id }})"
        steps:
            -   name: 💝 Setup AWS CLI 💝
                uses: aws-actions/configure-aws-credentials@v6
                with:
                    aws-secret-access-key: ${{ secrets.AWS_S3_ACCESS_SECRET }}
                    aws-access-key-id: ${{ vars.AWS_S3_ACCESS_KEY }}
                    aws-region: us-east-1

            -   name: 💝 Checkout repository 💝
                uses: actions/checkout@v6

            -   name: 💝 Build products 💝
                run: |
                    Scripts/Linux/Build ${{ matrix.arch.id }} \
                        --os ${{ matrix.os.codename }}
                    Scripts/Package .build.${{ matrix.arch.id }} \
                        unidoc-linkerd \
                        unidocd

            -   name: 💝 Upload products 💝
                env:
                    DEPLOY_PLATFORM: "${{ matrix.os.version }}-${{ matrix.arch.name }}"
                    DEPLOY_VERSION: ${{ github.head_ref || github.ref_name }}

                run: Scripts/Deploy unidoc-linkerd.tar.gz unidocd.tar.gz
