# This workflow builds the project for production, with IndexStoreDB integration enabled.
name: Test

on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    changes:
        runs-on: ubuntu-latest
        name: Assess changes
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Decide checks 💖
                uses: tj-actions/changed-files@v47
                id: changes
                with:
                    files_ignore: |
                        README.md
                        LICENSE
                        NOTICE
                        .mailmap
                        .gitignore
                        .github/FUNDING.yml
        outputs:
            code_changed: ${{ steps.changes.outputs.any_changed }}

    linux-server:
        runs-on: ubuntu-24.04
        name: Linux (server)
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Set up mock deployments 💖
                run: |
                    docker compose -f Guides/docs.docc/local/docker-compose.yml up -d

            -   name: 💖 Initialize replica set 💖
                run: |
                    timeout 60s bash -c \
                    'until docker exec -t unidoc-mongod-container \
                    /bin/mongosh --file /unidoc-rs-init-containerized.js; do sleep 1; done'

            -   name: 💖 Run pipeline 💖
                run: |
                    docker run -t --rm \
                        --network=unidoc-test \
                        --name swift-environment \
                        --user root \
                        -v $PWD:/swift/swift-unidoc \
                        -w /swift/swift-unidoc \
                        -e SWIFT_INSTALLATION=/usr \
                        swift:6.2.4-noble \
                        /bin/bash Scripts/Linux/TestAll

    linux:
        runs-on: ubuntu-24.04
        name: Linux
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        env:
            UNIDOC_ENABLE_INDEXSTORE: "1"

        steps:
            -   name: 💖 Install Swift 💖
                uses: rarestype/swift-install-action@master
                with:
                    swift-prefix: "swift-6.2.4-release/ubuntu2404/swift-6.2.4-RELEASE"
                    swift-id: "swift-6.2.4-RELEASE-ubuntu24.04"

            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Check format 💖
                run: |
                    swift package dollup --allow-writing-to-package-directory
                    git diff --exit-code

            -   name: 💖 Build release 💖
                run: |
                    swift --version
                    swift build -c release \
                        --product ssgc \
                        --explicit-target-dependency-import-check=warn \
                        -Xcxx -I$SWIFT_INSTALLATION/lib/swift \
                        -Xcxx -I$SWIFT_INSTALLATION/lib/swift/Block
                    mkdir $HOME/bin
                    mv .build/release/ssgc $HOME/bin
                    echo "$HOME/bin" >> $GITHUB_PATH

            -   name: 💖 Build packages 💖
                run: Scripts/Linux/GeneratePackageSymbolGraphs

            -   name: 💖 Validate packages 💖
                run: |
                    swift test -c release \
                        --no-parallel \
                        --filter SymbolGraphValidationTests \
                        -Xcxx -I$SWIFT_INSTALLATION/lib/swift \
                        -Xcxx -I$SWIFT_INSTALLATION/lib/swift/Block

    macos:
        runs-on: macos-26
        name: macOS
        needs: changes
        if: ${{ needs.changes.outputs.code_changed == 'true' }}
        env:
            UNIDOC_ENABLE_INDEXSTORE: "1"

        steps:
            -   name: 💖 Checkout repository 💖
                uses: actions/checkout@v6

            -   name: 💖 Select Xcode 26.3 💖
                run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

            -   name: 💖 Check format 💖
                run: |
                    swift package dollup --allow-writing-to-package-directory
                    git diff --exit-code

            -   name: 💖 Build release 💖
                run: |
                    swift --version
                    swift build -c release \
                        --product ssgc \
                        --explicit-target-dependency-import-check=warn
                    mkdir $HOME/bin
                    mv .build/release/ssgc $HOME/bin
                    echo "$HOME/bin" >> $GITHUB_PATH

            -   name: 💖 Build packages 💖
                run: Scripts/macOS/GeneratePackageSymbolGraphs

            -   name: 💖 Validate packages 💖
                run: |
                    swift test -c release \
                        --no-parallel \
                        --filter SymbolGraphValidationTests
